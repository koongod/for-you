<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 1 Month ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div id="loader">
    <h1>💖</h1>
    <h2>Happy 1 Month</h2>
</div>

<canvas id="stars"></canvas>

<div class="hearts"></div>

<section class="hero">

    <h1>
        Happy 1 Month
    </h1>

    <h2>
        โชกุน ❤️ วิว
    </h2>

    <p>
        ขอบคุณที่เข้ามาเป็นรอยยิ้มของกันและกัน
    </p>

</section>

<section class="timer">

    <h2>เราอยู่ด้วยกันมา</h2>

    <div class="countdown">

        <div>
            <span id="days">0</span>
            <small>วัน</small>
        </div>

        <div>
            <span id="hours">0</span>
            <small>ชั่วโมง</small>
        </div>

        <div>
            <span id="minutes">0</span>
            <small>นาที</small>
        </div>

        <div>
            <span id="seconds">0</span>
            <small>วินาที</small>
        </div>

    </div>

</section>

<section class="gallery">

<h2>📸 ความทรงจำของเรา</h2>

<div class="slider">

<img src="images/1.jpg">

<img src="images/2.jpg">

<img src="images/3.jpg">

<img src="images/4.jpg">

<img src="images/5.jpg">

</div>

</section>

<section class="letter">

<h2>💌 ถึงวิว</h2>

<div class="paper">

<p id="typing"></p>

</div>

</section>

<section class="music">

<button id="playMusic">

🎵 เปิดดนตรี

</button>

</section>

<footer>

Made with ❤️ by Shogun

</footer>

<script src="script.js"></script>

</body>

</html>
